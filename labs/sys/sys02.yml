---
# -----------------------------------------------------------------------------
# File        : ctlabs/labs/sys/sys02.yml
# Description : Continuous Integration Lab (v2.0 Schema)
# -----------------------------------------------------------------------------

name: sys02
desc: LAB SYS - CI

topology:
- hv  : lvm-vm1
  dns : [192.168.10.11, 192.168.20.11, 8.8.8.8]
  planes:
    mgmt:
      vrfid: 99
      dns:
      - 1.1.1.1
      - 8.8.8.8
      net: 192.168.99.0/24
      gw: 192.168.99.1
      nodes:
        ansible:
          type: controller
          profile: linux
          gw: 192.168.99.1
          nics:
            eth0: 192.168.99.3/24
          vols : ['/root/ctlabs-ansible/:/root/ctlabs-ansible/:Z,rw', '/root/ctlabs-terraform/:/root/ctlabs-terraform/:Z,rw']
          play:
            book: ctlabs.yml
            tags:
            - up
            - setup
            - ca
            - bind
            - vault
            - rundeck
            - jenkins
            - gitea
            - atlantis
            env:
            - CTLABS_VAULT_SERVER=true
            inv: sys02.ini
          dnat:
          - [ 8192, 4443 ]
          - [ 8193, 8080 ]
        sw0:
          type: switch
          profile: mgmt
          ipv4: 192.168.99.10/24
          gw: 192.168.99.1
          ports: 15
        ro0:
          type: router
          profile: frr
          gw: 192.168.15.1
          nics:
            eth0: 192.168.99.1/24
            eth1: 192.168.15.2/29
        jnk1:
          type: host
          profile: linux
          plane: mgmt
          gw: 192.168.99.1
          provider: local
          adhoc: true
    edge:
      nodes:
        natgw:
          type: gateway
          ipv4: 192.168.15.1/29
          snat: true
          dnat:
            data: ro1:eth1
            mgmt: ro0:eth1
    transit:
      nodes:
        ro1:
          type: router
          profile: frr
          gw: 192.168.15.1
          nics:
            eth1: 192.168.15.3/29
            eth2: 192.168.10.1/24
            eth3: 192.168.20.1/24
            eth4: 192.168.30.1/24
    data:
      nodes:
        sw1:
          type: switch
        sw2:
          type: switch
        sw3:
          type: switch
        ns1:
          type: host
          profile: linux
          gw: 192.168.10.1
          nics:
            eth1: 192.168.10.11/24
        ns2:
          type: host
          profile: d12
          gw: 192.168.20.1
          nics:
            eth1: 192.168.20.11/24
        h1:
          type: host
          profile: kali
          gw: 192.168.10.1
          nics:
            eth1: 192.168.10.12/24
          vols:
          - "/srv/jupyter/h1/:/srv/jupyter/work/:Z,rw"
          dnat:
          - [ 1088, 8888 ]
        h2:
          type: host
          profile: linux
          gw: 192.168.20.1
          nics:
            eth1: 192.168.20.12/24
          vols:
          - "/srv/jupyter/h2/:/srv/jupyter/work/:Z,rw"
          dnat:
          - [ 2088, 8888 ]
        vdb1:
          type: host
          profile: vault
          gw: 192.168.30.1
          nics:
            eth1: 192.168.30.11/24
          dnat:
          - [ 8081, 8200 ]
        git1:
          type: host
          profile: linux
          gw: 192.168.30.1
          nics:
            eth1: 192.168.30.15/24
          dnat:
          - [ 8082, 3000 ]
        ats1:
          type: host
          profile: linux
          gw: 192.168.30.1
          nics:
            eth1: 192.168.30.16/24
          dnat:
          - [ 8083, 4141 ]
  links:
  - [ "ro0:eth1", "natgw:eth1" ]
  - [ "ro1:eth1", "natgw:eth2" ]
  - [ "ro1:eth2", "sw1:eth1" ]
  - [ "ro1:eth3", "sw2:eth1" ]
  - [ "ro1:eth4", "sw3:eth1" ]
  - [ "sw1:eth2", "ns1:eth1" ]
  - [ "sw1:eth3", "h1:eth1" ]
  - [ "sw2:eth2", "ns2:eth1" ]
  - [ "sw2:eth3", "h2:eth1" ]
  - [ "sw3:eth2", "vdb1:eth1" ]
  - [ "sw3:eth3", "git1:eth1" ]
  - [ "sw3:eth4", "ats1:eth1" ]
