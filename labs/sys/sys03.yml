---

# -----------------------------------------------------------------------------
# File         : ctlabs/labs/sys/sys03.yml
# Description  : Windows AD-DC Lab configuration
# Requirements : min. 20G storage per dc-instance
# -----------------------------------------------------------------------------

name: sys03
desc: LAB SYS - Windows AD-DC

topology:
  - hv: lvm-vm1
    dns : [192.168.10.11, 192.168.20.11, 8.8.8.8]
    planes:
      mgmt:
        vrfid : 99
        dns   : [1.1.1.1, 8.8.8.8]
        net   : 192.168.99.0/24
        gw    : 192.168.99.1
        nodes:
          ansible:
            type : controller
            gw   : 192.168.99.1
            nics :
              eth0: 192.168.99.3/24
            vols : ['/root/ctlabs-ansible/:/root/ctlabs-ansible/:Z,rw', '/root/ctlabs-terraform/:/root/ctlabs-terraform/:Z,rw']
            play:
              book: ctlabs.yml
              tags: [up, setup, bind, ca, httpd, guacamole]
          sw0:
            profile: mgmt
            type: switch
            ipv4: 192.168.99.10/24
            gw  : 192.168.99.1
          ro0:
            profile: frr
            type: router
            gw  : 192.168.15.1
            nics:
              eth0: 192.168.99.1/24
              eth1: 192.168.15.2/29

      edge:
        nodes:
          natgw:
            type: gateway
            ipv4: 192.168.15.1/29
            snat: true
            dnat: 
              data: ro1:eth1

      transit:
        nodes:
          sw1:
            profile: ovs
            type: switch
          sw2:
            profile: ovs
            type: switch
          sw3:
            profile: ovs
            type: switch
            ports: 8
          ro1:
            profile: frr
            type: router
            gw  : 192.168.15.1
            nics:
              eth1: 192.168.15.3/29
              eth2: 192.168.10.1/24
              eth3: 192.168.20.1/24
              eth4: 192.168.30.1/24

      data:
        nodes:
          ns1:
            type: host
            gw  : 192.168.10.1
            nics:
              eth1: 192.168.10.11/24
          ns2:
            profile: d12
            type: host
            gw  : 192.168.20.1
            nics:
              eth1: 192.168.20.11/24
          h1:
            profile: kali
            type: host
            gw  : 192.168.10.1
            nics:
              eth1: 192.168.10.12/24
          h2:
            profile: parrot
            type: host
            gw  : 192.168.20.1
            nics:
              eth1: 192.168.20.12/24
          gua1:
            type: host
            gw  : 192.168.30.1
            nics:
              eth1: 192.168.30.17/24
            dnat:
              - [8081, 443]
          dc1:
            profile: win
            type: host
            kvm : true
            gw  : 192.168.30.1
            env : ['VERSION=2022','CPU_CORES=2','RAM_SIZE=2G','DISK_SIZE=20G','DHCP=no','NETWORK=n','VNC=1']
            vols: ['/media/volumes/sys03/dc1/:/storage/:rw,Z']
            nics:
              eth1: 192.168.30.13/24
              eth2: 192.168.30.14/24
          dc2:
            profile: win
            type: host
            kvm : true
            gw  : 192.168.30.1
            env : ['VERSION=2022','CPU_CORES=2','RAM_SIZE=2G','DISK_SIZE=20G','DHCP=no','NETWORK=n','VNC=1']
            vols: ['/media/volumes/sys03/dc2/:/storage/:rw,Z']
            nics:
              eth1: 192.168.30.23/24
              eth2: 192.168.30.24/24

    links:
      - [ "ro0:eth1", "natgw:eth1" ]

      - [ "ro1:eth1", "natgw:eth2" ]
      - [ "ro1:eth2", "sw1:eth1"   ]
      - [ "ro1:eth3", "sw2:eth1"   ]
      - [ "ro1:eth4", "sw3:eth1"   ]

      - [ "sw1:eth2", "ns1:eth1"   ]
      - [ "sw1:eth3", "h1:eth1"    ]

      - [ "sw2:eth2", "ns2:eth1"   ]
      - [ "sw2:eth3", "h2:eth1"    ]

      - [ "sw3:eth2", "gua1:eth1"  ]
      
      - [ "sw3:eth3", "dc1:eth1"   ]
      - [ "sw3:eth4", "dc1:eth2"   ]

      - [ "sw3:eth5", "dc2:eth1"   ]
      - [ "sw3:eth6", "dc2:eth2"   ]
