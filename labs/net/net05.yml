---

# -----------------------------------------------------------------------------
# File        : ctlabs/labs/net/net05.yml
# Description : LACP Lab configuration
# -----------------------------------------------------------------------------

name: net05
desc: LAB Net - LACP

topology:
  - vm:
    name: lacp-vm1
    dns : [192.168.10.11, 192.168.20.11, 8.8.8.8]
    mgmt:
      vrfid : 99
      dns   : [1.1.1.1, 8.8.8.8]
      net   : 192.168.99.0/24
      gw    : 192.168.99.1
    nodes:
      ansible:
        type : controller
        gw   : 192.168.99.1
        nics :
          eth0: 192.168.99.3/24
        vols : ['/root/ctlabs-ansible/:/root/ctlabs-ansible/:Z,rw', '/root/ctlabs-terraform/:/root/ctlabs-terraform/:Z,rw']
        play:
          book: ctlabs.yml
          tags: [up, setup, bind]
      sw0:
        profile: ovs
        type: switch
        ipv4: 192.168.99.10/24
        gw  : 192.168.99.1
      ro0:
        profile: frr
        type: router
        gw  : 192.168.15.1
        nics:
          eth0: 192.168.99.1/24
          eth1: 192.168.15.2/29
      natgw:
        type: gateway
        ipv4: 192.168.15.1/29
        snat: true
        dnat: 
          data: ro1:eth1
      sw1:
        profile: ovs
        type: switch
      sw2:
        profile: ovs
        type: switch
      sw3:
        profile: arista
        type: switch
      sw4:
        profile: arista
        type: switch
      ro1:
        profile: frr
        type: router
        gw  : 192.168.15.1
        nics:
          eth1: 192.168.15.3/29
          eth2: 192.168.10.1/24
          eth3: 192.168.20.1/24
          eth4:
          eth5:
        bonds :
          bond0:
            mode: 802.3ad xmit_hash_policy layer2+3
            nics: [eth4, eth5]
            vlan:
              30: 192.168.30.1/24
              35: 192.168.35.1/24
      ns1:
        type : host
        gw   : 192.168.10.1
        nics :
          eth1: 192.168.10.11/24
      ns2:
        profile: d12
        type: host
        gw  : 192.168.20.1
        nics:
          eth1: 192.168.20.11/24
      h1:
        profile: qemu
        type: host
        kvm : true
        gw  : 192.168.10.1
        vols: ['/media/volumes/sys01/:/media/vols/:rw,Z']
        nics:
          eth1: 192.168.10.12/24
      h2:
        profile: qemu
        type: host
        kvm : true
        gw  : 192.168.20.1
        vols: ['/media/volumes/sys01/:/media/vols/:rw,Z']
        nics:
          eth1: 192.168.20.12/24
      h3:
        type : host
        gw   : 192.168.30.1
        nics :
          eth1:
          eth2:
          eth3:
          eth4:
        bonds :
          bond0:
            mode: 802.3ad xmit_hash_policy layer2+3
            nics: [eth1, eth2]
            vlan:
              30: 192.168.30.12/24
          bond1:
            mode: 802.3ad xmit_hash_policy layer2+3
            nics: [eth3, eth4]
            vlan:
              35: 192.168.35.12/24

    links:
      - [ "ro0:eth1", "natgw:eth1" ]

      - [ "ro1:eth1", "natgw:eth2" ]
      - [ "ro1:eth2", "sw1:eth1"   ]
      - [ "ro1:eth3", "sw2:eth1"   ]
      - [ "ro1:eth4", "sw3:eth1"   ]
      - [ "ro1:eth5", "sw4:eth1"   ]

      - [ "sw1:eth2", "ns1:eth1"   ]
      - [ "sw1:eth3", "h1:eth1"    ]

      - [ "sw2:eth2", "ns2:eth1"   ]
      - [ "sw2:eth3", "h2:eth1"    ]

      - [ "sw3:eth2", "h3:eth1"    ]
      - [ "sw3:eth3", "h3:eth3"    ]
      - [ "sw3:eth4", "sw4:eth4"   ]

      - [ "sw4:eth2", "h3:eth2"    ]
      - [ "sw4:eth3", "h3:eth4"    ]
      - [ "sw4:eth5", "sw3:eth5"   ]
