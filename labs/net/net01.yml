---
# -----------------------------------------------------------------------------
# File        : ctlabs/labs/net/net01.yml
# Description : Simple BGP Setup (v2.0 Schema)
# -----------------------------------------------------------------------------

name: net01
desc: BGP Lab

# 1. 'defaults' renamed to 'profiles'
profiles:
  controller:
    linux:
      image: ctlabs/c9/ctrl
  switch:
    mgmt:
      image: ctlabs/c9/ctrl
      ports: 12
    linux:
      image: ctlabs/c9/base
      ports: 4
    ovs:
      image: ctlabs/c9/ovs
      caps: [SYS_NICE, NET_BIND_SERVICE, IPC_LOCK, NET_BROADCAST]
      ports: 4
  host:
    linux:
      image: ctlabs/c9/base
    kali:
      image: ctlabs/kali/base
    parrot:
      image: ctlabs/parrot/base
  router:
    frr:
      image: ctlabs/c9/frr
      caps: [SYS_NICE, NET_RAW, NET_BIND_SERVICE]
    mgmt:
      image: ctlabs/c9/frr
      caps: [SYS_NICE, NET_RAW, NET_BIND_SERVICE]
  gateway:
    remote:
      image: ctlabs/c9/base

topology:
  # 2. 'vm' renamed to 'hv'
  - hv: net01-vm1
    provider: local
    dns: [192.168.10.11, 192.168.20.11, 8.8.8.8]
    
    # 3. The structural Planes block
    planes:
      
      # --- MANAGEMENT PLANE ---
      mgmt:
        # Management Network configuration belongs here now!
        vrfid: 99
        dns: [1.1.1.1, 8.8.8.8]
        net: 192.168.99.0/24
        gw: 192.168.99.1
        nodes:
          ansible:
            type: controller
            profile: linux  # 'kind' renamed to 'profile'
            gw: 192.168.99.1
            nics: { eth0: 192.168.99.5/24 }
            vols:
              - "/root/ctlabs-ansible/:/root/ctlabs-ansible/:Z,rw"
              - "/srv/jupyter/ansible/:/srv/jupyter/work/:Z,rw"
            play:
              book: ctlabs.yml
              tags: [up, setup, ca, bind]
              inv: net01.ini
            dnat:
              - [9988, 8888]
          sw0:
            type: switch
            profile: mgmt
            ipv4: 192.168.99.10/24
            gw: 192.168.99.1
          ro0:
            type: router
            profile: mgmt
            gw: 192.168.15.1
            nics:
              eth0: 192.168.99.1/24
              eth1: 192.168.15.2/29

      # --- EDGE PLANE ---
      edge:
        nodes:
          natgw:
            type: gateway
            ipv4: 192.168.15.1/29
            snat: true
            dnat:
              # Explicit Routing Dictionary!
              data: ro1:eth1
              mgmt: ro0:eth1

      # --- TRANSIT PLANE ---
      transit:
        nodes:
          ro1:
            type: router
            profile: frr
            gw: 192.168.15.1
            devs: ["/dev/net/tun"]
            nics:
              eth1: 192.168.15.3/29
              eth2: 192.168.10.1/24
              eth3: 192.168.12.1/30
          ro2:
            type: router
            profile: frr
            nics:
              eth2: 192.168.20.1/24
              eth3: 192.168.12.2/30
              
          # Your Ad-Hoc remote gateway perfectly integrated!
          lab1-gw:
            type: gateway
            profile: remote
            provider: external  # Tells CTLabs to skip Docker!
            gw: 192.168.110.115
            nics: { tun0: 18.8.15.1 }
            term: ssh://schaewo@192.168.110.115

      # --- DATA PLANE ---
      data:
        nodes:
          sw1:
            type: switch
            profile: ovs
          sw2:
            type: switch
            profile: ovs
          sw3:
            type: switch
            profile: ovs
          ns1:
            type: host
            profile: linux
            gw: 192.168.10.1
            nics: { eth1: 192.168.10.11/24 }
          ns2:
            type: host
            profile: linux
            gw: 192.168.20.1
            nics: { eth1: 192.168.20.11/24 }
            
          h1:
            type: host
            profile: kali
            gw: 192.168.10.1
            nics: { eth1: 192.168.10.12/24 }
          h2:
            type: host
            profile: parrot
            gw: 192.168.20.1
            nics: { eth1: 192.168.20.12/24 }

    # 4. Links remain at the bottom, bridging the planes
    links:
      - [ "ro0:eth1", "natgw:eth1"   ]

      - [ "ro1:eth1", "natgw:eth2"   ]    
      - [ "ro1:eth2", "sw1:eth1"     ]
      - [ "ro1:eth3", "sw2:eth1"     ]
      - [ "ro1:eth4", "lab1-gw:eth1" ]

      - [ "ro2:eth2", "sw2:eth2"     ]
      - [ "ro2:eth3", "sw3:eth1"     ]
      
      - [ "sw1:eth2", "h1:eth1"      ]
      - [ "sw1:eth3", "ns1:eth1"     ]
      
      - [ "sw3:eth2", "h2:eth1"      ]
      - [ "sw3:eth3", "ns2:eth1"     ]
