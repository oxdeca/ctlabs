---
# -----------------------------------------------------------------------------
# File        : ctlabs/labs/net/net01.yml
# Description : Simple BGP Setup (v2.0 Schema)
# -----------------------------------------------------------------------------

name: net01
desc: BGP Lab

topology:
- hv: net01-vm1
  provider: local
  dns: [192.168.10.11, 192.168.20.11, 8.8.8.8]
  planes:
    mgmt:
      vrfid : 99
      dns   : [1.1.1.1, 8.8.8.8]
      net   : 192.168.99.0/24
      gw    : 192.168.99.1
      nodes:
        ansible:
          type: controller
          gw  : 192.168.99.1
          nics:
            eth0: 192.168.99.5/24
          vols : ['/root/ctlabs-ansible/:/root/ctlabs-ansible/:Z,rw', '/root/ctlabs-terraform/:/root/ctlabs-terraform/:Z,rw']
          play:
            book: ctlabs.yml
            tags: [up, setup, ca, bind]
            inv: net01.ini
          dnat:
          - [ 9988, 8888 ]
        sw0:
          profile: mgmt
          type: switch
          ipv4: 192.168.99.10/24
          gw  : 192.168.99.1
        ro0:
          profile: frr
          type: router
          gw  : 192.168.15.1
          nics:
            eth0: 192.168.99.1/24
            eth1: 192.168.15.2/29
    edge:
      nodes:
        natgw:
          type: gateway
          ipv4: 192.168.15.1/29
          snat: true
          dnat:
            data: ro1:eth1
            mgmt: ro0:eth1

    transit:
      nodes:
        ro1:
          profile: frr
          type: router
          gw  : 192.168.15.1
          devs:
          - "/dev/net/tun"
          nics:
            eth1: 192.168.15.3/29
            eth2: 192.168.10.1/24
            eth3: 192.168.12.1/30
        ro2:
          profile: frr
          type: router
          nics:
            eth2: 192.168.20.1/24
            eth3: 192.168.12.2/30
        lab1-gw:
          provider: external
          profile: remote
          type: gateway
          gw: 192.168.110.115
          nics:
            tun0: 18.8.15.1
          term: ssh://schaewo@192.168.110.115

    data:
      nodes:
        sw1:
          profile: ovs
          type: switch
        sw2:
          profile: ovs
          type: switch
        sw3:
          profile: ovs
          type: switch
        ns1:
          type: host
          gw  : 192.168.10.1
          nics:
            eth1: 192.168.10.11/24
        ns2:
          type: host
          gw  : 192.168.20.1
          nics:
            eth1: 192.168.20.11/24
        h1:
          profile: kali
          type: host
          gw  : 192.168.10.1
          nics:
            eth1: 192.168.10.12/24
        h2:
          profile: kali
          type: host
          gw  : 192.168.20.1
          nics:
            eth1: 192.168.20.12/24
          provider: local

  links:
  - [ "ro0:eth1", "natgw:eth1" ]
  - [ "ro1:eth1", "natgw:eth2" ]
  - [ "ro1:eth2", "sw1:eth1" ]
  - [ "ro1:eth3", "sw2:eth1" ]
  - [ "ro1:eth4", "lab1-gw:eth1" ]
  - [ "ro2:eth2", "sw2:eth2" ]
  - [ "ro2:eth3", "sw3:eth1" ]
  - [ "sw1:eth2", "ns1:eth1" ]
  - [ "sw1:eth3", "h1:eth1" ]
  - [ "sw3:eth2", "ns2:eth1" ]
  - [ "sw3:eth3", "h2:eth1" ]
