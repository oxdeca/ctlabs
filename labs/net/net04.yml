---

# -----------------------------------------------------------------------------
# File        : ctlabs/net/net04.yml
# Description : netbox Lab ctlabs configuration
# -----------------------------------------------------------------------------

name: net04
desc: Netbox Lab

topology:
  - vm:
    name: net04-vm1
    dns : [192.168.10.11, 192.168.20.11, 8.8.8.8]
    mgmt:
      vrfid : 99
      dns   : [1.1.1.1, 8.8.8.8]
      net   : 192.168.99.0/24
      gw    : 192.168.99.1
    nodes:
      ansible :
        type : controller
        gw   : 192.168.99.1
        nics :
          eth0: 192.168.99.5/24
        vols : ['/root/ctlabs-ansible/:/root/ctlabs-ansible/:Z,rw', '/root/ctlabs-terraform/:/root/ctlabs-terraform/:Z,rw']
        play:
          book: ctlabs.yml
          tags: [up, setup, ca, bind, jupyter, smbadc, slapd, httpd, postgresql, redis, netbox, guacamole]
        dnat :
          - [9988, 8888]
      sw0:
        profile: ovs
        type : switch
        ipv4 : 192.168.99.10/24
        gw   : 192.168.99.1
      ro0:
        profile: frr
        type: router
        gw  : 192.168.15.1
        nics:
          eth0: 192.168.99.1/24
          eth1: 192.168.15.2/29
      natgw:
        type: gateway
        ipv4: 192.168.15.1/29
        snat: true
        dnat: 
          data: ro1:eth1
      sw1:
        profile: ovs
        type: switch
      sw2:
        profile: ovs
        type: switch
      sw3:
        profile: ovs
        type: switch
      sw4:
        profile: ovs
        type: switch
      ro1:
        profile: frr
        type: router
        gw  : 192.168.15.1
        nics:
          eth1: 192.168.15.3/29
          eth2: 192.168.10.1/24
          eth3: 192.168.20.1/24
          eth4: 192.168.30.1/24
          eth5: 192.168.50.1/28
      ns1:
        type : host
        gw   : 192.168.10.1
        nics :
          eth1: 192.168.10.11/24
      ns2:
        profile: d12
        type: host
        gw  : 192.168.20.1
        nics:
          eth1: 192.168.20.11/24
      h1:
        profile: kali
        type: host
        gw  : 192.168.10.1
        nics:
          eth1: 192.168.10.12/24
        vols : ['/srv/jupyter/h1/:/srv/jupyter/work/:Z,rw']
        dnat :
          - [1088, 8888]
      h2:
        profile: parrot
        type: host
        gw  : 192.168.20.1
        nics:
          eth1: 192.168.20.12/24
        vols : ['/srv/jupyter/h2/:/srv/jupyter/work/:Z,rw']
        dnat :
          - [2088, 8888]
      slapd1:
        type : host
        gw   : 192.168.10.1
        nics :
          eth1: 192.168.10.13/24
      dc1:
        profile: d12
        type: host
        gw  : 192.168.10.1
        nics:
          eth1: 192.168.10.14/24
      nb1:
        type : host
        gw   : 192.168.30.1
        nics :
          eth1: 192.168.30.13/24
        vols : ['/media/volumes/net04/nb1/backup/:/backup/:Z,rw']
        dnat :
          - [8081, 443]
      gua1:
        type : host
        gw   : 192.168.30.1
        nics :
          eth1: 192.168.30.14/24
        dnat :
          - [8082, 443]
      db1:
        type : host
        gw   : 192.168.50.1
        nics :
          eth1: 192.168.50.5/28

    links:
      - [ "ro0:eth1",  "natgw:eth1"  ]

      - [ "ro1:eth1",  "natgw:eth2"  ]
      - [ "ro1:eth2",  "sw1:eth1"    ]
      - [ "ro1:eth3",  "sw2:eth1"    ]
      - [ "ro1:eth4",  "sw3:eth1"    ]
      - [ "ro1:eth5",  "sw4:eth1"    ]

      - [ "sw1:eth2",  "ns1:eth1"    ]
      - [ "sw1:eth3",  "h1:eth1"     ]
      - [ "sw1:eth4",  "slapd1:eth1" ]
      - [ "sw1:eth5",  "dc1:eth1"    ]

      - [ "sw2:eth2",  "ns2:eth1"    ]
      - [ "sw2:eth3",  "h2:eth1"     ]

      - [ "sw3:eth2",  "nb1:eth1"    ]
      - [ "sw3:eth3",  "gua1:eth1"   ]

      - [ "sw4:eth2",  "db1:eth1"    ]
