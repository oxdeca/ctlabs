---
# -----------------------------------------------------------------------------
# File        : ctlabs/labs/db/db01.yml
# Description : DB2 Lab ctlabs configuration
# -----------------------------------------------------------------------------

name: db01
desc: LAB DB2

topology:
  - hv: db01-vm1
    dns : [192.168.10.11, 192.168.10.12, 8.8.8.8]
    planes:
      mgmt:
        vrfid : 99
        dns   : [1.1.1.1, 8.8.8.8]
        net   : 192.168.99.0/24
        gw    : 192.168.99.1
        nodes:
          ansible :
            type : controller
            gw   : 192.168.99.1
            nics :
              eth0: 192.168.99.3/24
            vols : ['/root/ctlabs-ansible/:/root/ctlabs-ansible/:Z,rw', '/root/ctlabs-terraform/:/root/ctlabs-terraform/:Z,rw']
            play: 
              book: ctlabs.yml
              tags: [up, setup, ca, bind, jupyter, smbadc, slapd, sssd]
            dnat :
              - [9988, 8888]
          sw0:
            type  : switch
            profile  : mgmt
            ipv4  : 192.168.99.11/24
            gw    : 192.168.99.1
          ro0:
            type : router
            profile : frr
            gw   : 192.168.15.1
            nics :
              eth0: 192.168.99.1/24
              eth1: 192.168.15.2/29

      edge:
        nodes:
          natgw:
            type: gateway
            ipv4: 192.168.15.1/29
            snat: true
            dnat: ro1:eth1

      transit:
        nodes:
          ro1:
            type : router
            profile : frr
            gw   : 192.168.15.1
            nics :
              eth1: 192.168.15.3/29
              eth2: 192.168.10.1/24
              eth3: 192.168.20.1/24
              eth4: 192.168.30.1/24

      data:
        nodes:
          sw1:
            type : switch
          sw2:
            type : switch
          sw3:
            type : switch
          ns1:
            type : host
            gw   : 192.168.10.1
            nics :
              eth1: 192.168.10.11/24
          ns2:
            type : host
            gw   : 192.168.20.1
            nics :
              eth1: 192.168.20.11/24
          h1:
            type : host
            gw   : 192.168.10.1
            nics :
              eth1: 192.168.10.12/24
            vols : ['/srv/jupyter/h1/:/srv/jupyter/work/:Z,rw']
            dnat :
              - [1088, 8888]
          h2:
            type : host
            profile : parrot
            gw   : 192.168.20.1
            nics :
              eth1: 192.168.20.12/24
            vols : ['/srv/jupyter/h2/:/srv/jupyter/work/:Z,rw']
            dnat :
              - [2088, 8888]
          slapd1:
            type : host
            gw   : 192.168.10.1
            nics :
              eth1: 192.168.10.13/24
          dc1:
            type : host
            profile : d12
            gw   : 192.168.10.1
            nics :
              eth1: 192.168.10.14/24
          db1:
            type : host
            profile : db2
            gw   : 192.168.30.1
            nics :
              eth1: 192.168.30.11/24
          cb1:
            type : host
            profile : cbeaver
            gw   : 192.168.20.1
            nics :
              eth1: 192.168.20.21/24
            dnat :
              - [8081, 443]

    links:
      - [ "ro0:eth1", "natgw:eth1"  ]

      - [ "ro1:eth1", "natgw:eth2"  ]
      - [ "ro1:eth2", "sw1:eth1"    ]
      - [ "ro1:eth3", "sw2:eth1"    ]
      - [ "ro1:eth4", "sw3:eth1"    ]

      - [ "sw1:eth2", "ns1:eth1"    ]
      - [ "sw1:eth3", "h1:eth1"     ]
      - [ "sw1:eth4", "slapd1:eth1" ]
      - [ "sw1:eth5", "dc1:eth1"    ]

      - [ "sw2:eth2", "ns2:eth1"    ]
      - [ "sw2:eth3", "h2:eth1"     ]
      - [ "sw2:eth6", "cb1:eth1"    ]

      - [ "sw3:eth2", "db1:eth1"    ]
