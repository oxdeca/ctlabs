---

profiles:
  controller:
    linux:
      image: ctlabs/c9/ctrl
  switch:
    ovs:
      image: ctlabs/c9/ovs
      ports: 4
      caps: [SYS_NICE, NET_BIND_SERVICE, IPC_LOCK, NET_BROADCAST]
    mgmt:
      image: ctlabs/c9/ctrl
      ports: 14
    linux:
      image: ctlabs/c9/base
      ports: 8
  host:
    linux:
      image: ctlabs/c9/base
    d12:
      image: ctlabs/d12/base
    kali:
      image: ctlabs/kali/base
    parrot:
      image: ctlabs/parrot/base
    vault:
      image: ctlabs/d12/base
      caps: [IPC_LOCK]
    slapd:
      image: ctlabs/d12/base
      caps: [SYS_PTRACE]
  router:
    frr:
      image: ctlabs/c9/frr
      caps: [SYS_NICE, NET_BIND_SERVICE]
    mgmt:
      image: ctlabs/c9/frr
      caps: [SYS_NICE, NET_BIND_SERVICE]
  gateway:
    remote:
      image: ctlabs/c9/base
