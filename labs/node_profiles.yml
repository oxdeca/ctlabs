---

# -----------------------------------------------------------------------------
# File        : ctlabs/labs/node_profiles.yml
# -----------------------------------------------------------------------------

profiles:
  controller:
    linux:
      image: ctlabs/c9/ctrl
  switch:
    ovs:
      image: ctlabs/c9/ovs
      ports: 4
      caps: [SYS_NICE, NET_BIND_SERVICE, IPC_LOCK, NET_BROADCAST]
    mgmt:
      image: ctlabs/c9/ovs
      ports: 14
      caps: [SYS_NICE, NET_BIND_SERVICE, IPC_LOCK, NET_BROADCAST]
    linux:
      image: ctlabs/c9/base
      ports: 8
    arista:
      image: ctlabs/misc/ceos
      ports: 5      
  host:
    linux:
      image: ctlabs/c9/base
    d12:
      image: ctlabs/d12/base
    kali:
      image: ctlabs/kali/base
    parrot:
      image: ctlabs/parrot/base
    vault:
      image: ctlabs/d12/base
      caps: [IPC_LOCK]
    slapd:
      image: ctlabs/d12/base
      caps: [SYS_PTRACE]
    qemu:
      image: ctlabs/d12/qemu
    db2:
      image: ctlabs/misc/db2
      caps: [SYS_NICE,IPC_LOCK,IPC_OWNER]
    cbeaver:
      image: ctlabs/misc/cbeaver
    juice:
      image: ctlabs/owasp/juice
    win:
      image: ctlabs/qemu/win
  router:
    frr:
      image: ctlabs/c9/frr
      caps: [SYS_NICE, NET_BIND_SERVICE]
      devs: ['/dev/net/tun']
    mgmt:
      image: ctlabs/c9/frr
      caps: [SYS_NICE, NET_BIND_SERVICE]
      devs: ['/dev/net/tun']
  gateway:
    remote:
      image: ctlabs/c9/base
