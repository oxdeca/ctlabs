---

# -----------------------------------------------------------------------------
# File        : ctlabs/sec/sec01.yml
# Description : CTF Lab configuration
# -----------------------------------------------------------------------------

name: sec01
desc: CTF Lab

topology:
  - hv: lpic207-vm1
    provider: local
    dns : [192.168.10.11, 192.168.20.11, 8.8.8.8]
    planes:
      mgmt:
        vrfid : 99
        dns   : [1.1.1.1, 8.8.8.8]
        net   : 192.168.99.0/24
        gw    : 192.168.99.1
        nodes:
          ansible:
            type : controller
            gw   : 192.168.99.1
            nics :
              eth0: 192.168.99.5/24
            vols : ['/root/ctlabs-ansible/:/root/ctlabs-ansible/:Z,rw', '/root/ctlabs-terraform/:/root/ctlabs-terraform/:Z,rw']
            play:
              book: ctlabs.yml
              tags: [up, setup, ca, bind, openvpn, xrdp, burp]
          sw0:
            profile: mgmt
            type: switch
            ipv4: 192.168.99.10/24
            gw  : 192.168.99.1
          ro0:
            profile: frr
            type: router
            gw  : 192.168.15.1
            nics:
              eth0: 192.168.99.1/24
              eth1: 192.168.15.2/29
      edge:
        nodes:
          natgw:
            type: gateway
            ipv4: 192.168.15.1/29
            snat: true
            dnat: 
              data: ro1:eth1
            
      transit:
        nodes:
          ro1:
            profile: frr
            type: router
            gw  : 192.168.15.1
            nics:
              eth1: 192.168.15.3/29
              eth2: 192.168.10.1/24
              eth3: 192.168.20.1/24
      data:
        nodes:
          sw1:
            profile: ovs
            type: switch
          sw2:
            profile: ovs
            type: switch
          ns1:
            type: host
            gw  : 192.168.10.1
            nics:
              eth1: 192.168.10.11/24
          ns2:
            profile: d12
            type: host
            gw  : 192.168.20.1
            nics:
              eth1: 192.168.20.11/24
          h1:
            profile: kali
            type: host
            gw  : 192.168.10.1
            nics:
              eth1: 192.168.10.12/24
            vols : ['/srv/jupyter/h1/:/srv/jupyter/work/:Z,rw']
            dnat :
              - [1088, 8888]
          h2:
            profile: parrot
            type: host
            gw  : 192.168.20.1
            nics:
              eth1: 192.168.20.12/24
            vols: ['/srv/jupyter/h2/:/srv/jupyter/work/:Z,rw']
            dnat:
              - [2088, 8888]
          burp1:
            profile: qemu
            type: host
            kvm : true
            gw  : 192.168.10.1
            env : ['QEMU_MEM=4G', 'QEMU_CPU=2']
            nics:
              eth1: 192.168.10.41/24
            dnat:
              - [8089, 3389]

    links:
      - [ "ro0:eth1", "natgw:eth1" ]
      
      - [ "ro1:eth1", "natgw:eth2" ]
      - [ "ro1:eth2", "sw1:eth1"   ]
      - [ "ro1:eth3", "sw2:eth1"   ]

      - [ "sw1:eth2", "ns1:eth1"   ]
      - [ "sw1:eth3", "h1:eth1"    ]
      - [ "sw1:eth4", "burp1:eth1" ]

      - [ "sw2:eth2", "ns2:eth1"   ]
      - [ "sw2:eth3", "h2:eth1"    ]
