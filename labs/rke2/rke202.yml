---

# -----------------------------------------------------------------------------
# File        : ctlabs/labs/rke2/rke202.yml
# Description : RKE2 Lab configuration
# -----------------------------------------------------------------------------

name: rke202
desc: LAB RKE2 (4 Nodes)

topology:
  - hv: rke202-vm1
    dns : [192.168.10.11, 192.168.20.11, 8.8.8.8]
    planes:
      mgmt:
        vrfid : 99
        dns   : [8.8.8.8, 1.1.1.1]
        net   : 192.168.99.0/24
        gw    : 192.168.99.1
        nodes:
          ansible:
            type : controller
            gw   : 192.168.99.1
            nics :
              eth0: 192.168.99.3/24
            vols : ['/root/ctlabs-ansible/:/root/ctlabs-ansible/:Z,rw', '/root/ctlabs-terraform/:/root/ctlabs-terraform/:Z,rw']
            play :
              book: ctlabs.yml
              tags: [up, setup, ca, bind, rke2-server, rke2-agent, vault]
              env : ['CTLABS_VAULT_SERVER=true']
            dnat :
              - [9988, 8888]
          sw0:
            type   : switch
            ipv4   : 192.168.99.10/24
            gw     : 192.168.99.1
            profile: mgmt
          ro0:
            type   : router
            gw     : 192.168.15.1
            profile: frr
            nics :
              eth0: 192.168.99.1/24
              eth1: 192.168.15.2/29

      edge:
        nodes:
          natgw:
            type: gateway
            ipv4: 192.168.15.1/29
            snat: true
            dnat: 
              data: ro1:eth1

      transit:
        nodes:
          ro1:
            type   : router
            gw     : 192.168.15.1
            profile: frr
            nics :
              eth1: 192.168.15.3/29
              eth2: 192.168.10.1/24
              eth3: 192.168.20.1/24
              eth4: 192.168.30.1/24

      data:
        nodes:
          sw1:
            type: switch
          sw2:
            type: switch
          sw3:
            type: switch
            ports: 6
          ns1:
            type: host
            gw  : 192.168.10.1
            nics:
              eth1: 192.168.10.11/24
          ns2:
            type   : host
            gw     : 192.168.20.1
            profile: d12
            nics :
              eth1: 192.168.20.11/24
          h1:
            type   : host
            gw     : 192.168.10.1
            profile: kali
            nics :
              eth1: 192.168.10.12/24
            vols : ['/srv/jupyter/h1/:/srv/jupyter/work/:Z,rw']
            dnat :
              - [1088, 8888]
          h2:
            type   : host
            gw     : 192.168.20.1
            profile: parrot
            nics :
              eth1: 192.168.20.12/24
            vols : ['/srv/jupyter/h2/:/srv/jupyter/work/:Z,rw']
            dnat :
              - [2088, 8888]
          vdb1:
            type   : host
            gw     : 192.168.30.1
            profile: vault
            nics :
              eth1: 192.168.30.11/24
            dnat :
              - [8081, 8200]
          rke21:
            type   : host
            kvm    : true
            gw     : 192.168.30.1
            env    : ['QEMU_MEM=3G','QEMU_CPU=2']
            vols   : ['/media/volumes/rke202/rke21/:/media/vols/:rw,Z']
            profile: qemu
            nics :
              eth1: 192.168.30.41/24
            dnat :
              - [1443, 443 ]
          rke22:
            type   : host
            kvm    : true
            gw     : 192.168.30.1
            env    : ['QEMU_MEM=3G','QEMU_CPU=2']
            vols   : ['/media/volumes/rke202/rke22/:/media/vols/:rw,Z']
            profile: qemu
            nics :
              eth1: 192.168.30.42/24
            dnat :
              - [2443, 443 ]
          rke23:
            type   : host
            kvm    : true
            gw     : 192.168.30.1
            env    : ['QEMU_MEM=3G','QEMU_CPU=2']
            vols   : ['/media/volumes/rke202/rke23/:/media/vols/:rw,Z']
            profile: qemu
            nics :
              eth1: 192.168.30.43/24
            dnat :
              - [3443, 443 ]
          rke24:
            type   : host
            kvm    : true
            gw     : 192.168.30.1
            env    : ['QEMU_MEM=3G','QEMU_CPU=2']
            vols   : ['/media/volumes/rke202/rke24/:/media/vols/:rw,Z']
            profile: qemu
            nics :
              eth1: 192.168.30.44/24
            dnat :
              - [4443, 443 ]

    links:
      - [ "ro0:eth1", "natgw:eth1" ]

      - [ "ro1:eth1", "natgw:eth2" ]
      - [ "ro1:eth2", "sw1:eth1"   ]
      - [ "ro1:eth3", "sw2:eth1"   ]
      - [ "ro1:eth4", "sw3:eth1"   ]

      - [ "sw1:eth2", "ns1:eth1"   ]
      - [ "sw1:eth3", "h1:eth1"    ]

      - [ "sw2:eth2", "ns2:eth1"   ]
      - [ "sw2:eth3", "h2:eth1"    ]

      - [ "sw3:eth2", "vdb1:eth1"  ]
      - [ "sw3:eth3", "rke21:eth1" ]
      - [ "sw3:eth4", "rke22:eth1" ]
      - [ "sw3:eth5", "rke23:eth1" ]
      - [ "sw3:eth6", "rke24:eth1" ]
